name: HACS Validation

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  hacs:
    runs-on: "ubuntu-latest"
    name: HACS Validation
    steps:
      - uses: "actions/checkout@v4"
      - name: HACS Validation
        uses: "hacs/action@main"
        with:
          category: "plugin"
